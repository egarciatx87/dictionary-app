<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="wrapper">
        <h1>Pocket Dictionary</h1>

        <section class="search-container">
            <input type="text" id="user-input" placeholder="Enter a word...">
            <button id="search-button">Search</button>
        </section>

        <section id="result-area" class="result">
            
            <div class="word-header">
                <h2 id="word-title">Word</h2>
                
                <button id="audio-button">Play Audio 🔊</button>
            </div>

            <p class="phonetic-text">Phonetic: <span id="phonetic-display">---</span></p>

            <div class="content-box">
                <h3>Definition</h3>
                <p id="definition-display">Meaning will appear here...</p>
            </div>

            <div class="content-box">
                <h3>Synonyms</h3>
                <p id="synonyms-display">None</p>
            </div>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
